services:
  #-----------------------------------------------
  #   Web Services
  #-----------------------------------------------
  caddy:
    image: caddy:2.10.0
    env_file: .env
    environment:
      - ACME_AGREE=true
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./src/staticfiles:/var/www/django/static
      - ./caddy_data:/data
      - ./caddy_config:/config
      - ./var/log/caddy:/var/log/
      - ./maintenance_mode/:/srv
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    depends_on:
      - django

  django:
    build: .
    # NOTE: We use watchmedo to reload gunicorn nicely, Uvicorn + Gunicorn reloads don't work well
    # Ensure MEDIA_ROOT exists on fresh clones so file uploads have a writable target.
    command: bash -c "mkdir -p /app/src/uploads && chmod 0777 /app/src/uploads && python manage.py collectstatic --noinput && cd /app/src && watchmedo auto-restart -p '*.py;*.html;*.json' --recursive -- python3 ./gunicorn_run.py"
    environment:
      - DATABASE_URL=postgres://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      - DJANGO_SETTINGS_MODULE=settings.develop
      - PYTHONPATH=/app:/app/src:/app/src/apps
      - GUNICORN_WORKERS=1
    env_file: .env
    volumes:
      - .:/app:delegated
      - django_uploads:/app/src/uploads
      - /tmp/codalab-v2/django:/codalab_tmp
      - ./backups:/app/backups
      - ./var/logs:/app/logs
    restart: unless-stopped
    ports:
      - 8000:8000
    depends_on:
      - db
      - rabbit
      - minio
    stdin_open: true
    tty: true
    logging:
      options:
        max-size: "20m"
        max-file: "5"


  #-----------------------------------------------
  # Minio local storage helper
  #-----------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data
    volumes:
      - minio_data:/data
    restart: unless-stopped
    ports:
      - $MINIO_PORT:9000
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-I", "http://minio:9000/minio/health/live"]
      interval: 5s
      retries: 5
  createbuckets:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    # volumes:
    #   This volume is shared with `minio`, so `z` to share it
    #   - ./var/minio:/export
    entrypoint: >
      /bin/sh -c "
      set -x;
      if [ -n \"$MINIO_ACCESS_KEY\" ] && [ -n \"$MINIO_SECRET_KEY\" ] && [ -n \"$MINIO_PORT\" ]; then
        until /usr/bin/mc alias set minio_docker http://minio:$MINIO_PORT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY && break; do
          echo '...waiting...' && sleep 5;
        done;
        /usr/bin/mc mb minio_docker/$AWS_STORAGE_BUCKET_NAME || echo 'Bucket $AWS_STORAGE_BUCKET_NAME already exists.';
        /usr/bin/mc mb minio_docker/$AWS_STORAGE_PRIVATE_BUCKET_NAME || echo 'Bucket $AWS_STORAGE_PRIVATE_BUCKET_NAME already exists.';
        /usr/bin/mc anonymous set download minio_docker/$AWS_STORAGE_BUCKET_NAME;
      else
        echo 'MINIO_ACCESS_KEY, MINIO_SECRET_KEY, or MINIO_PORT are not defined. Skipping buckets creation.';
      fi;
      exit 0;
      "

  #-----------------------------------------------
  #   Local development helper, rebuilds RiotJS/Stylus on change
  #-----------------------------------------------
  builder:
    build:
      context: .
      dockerfile: Dockerfile.builder
    volumes:
      - .:/app:delegated
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  #-----------------------------------------------
  #   Local submission runtime for survival workloads on modern Python
  #-----------------------------------------------
  submission_runtime_py310_survival:
    build:
      context: .
      dockerfile: docker/submission-runner/Dockerfile.py310-survival
    image: aidf-codabench-submission-runtime:py310-survival
    command: ["/bin/true"]
    restart: "no"


  #-----------------------------------------------
  #   Database Service
  #-----------------------------------------------
  db:
    image: postgres:12-alpine
    env_file: .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    command: ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr"]
    ports:
      - 5432:5432
    volumes:
      - ./var/postgres:/var/lib/postgresql/data:delegated
      - ./backups:/app/backups
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  #-----------------------------------------------
  #   Rabbitmq & Flower monitoring tool
  #-----------------------------------------------
  rabbit:
    build:
      context: .
      dockerfile: Dockerfile.rabbitmq
      args:
        - WORKER_CONNECTION_TIMEOUT=${WORKER_CONNECTION_TIMEOUT}
    # setting hostname here makes data persist properly between
    # containers being destroyed..!
    hostname: rabbit
    env_file: .env
    environment:
      - http_proxy=${RABBITMQ_HTTP_PROXY}
      - https_proxy=${RABBITMQ_HTTPS_PROXY}
      - no_proxy=${RABBITMQ_NO_PROXY}
    ports:
      - ${RABBITMQ_MANAGEMENT_PORT:-15672}:15672
      - ${RABBITMQ_PORT}:5672
    volumes:
      - ./var/rabbit:/var/lib/rabbitmq
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  flower:
    # image: mher/flower
    build:
      context: .
      dockerfile: Dockerfile.flower
    env_file: .env
    environment:
      - CELERY_BROKER_URL=pyamqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${RABBITMQ_HOST}:${RABBITMQ_PORT}//
    restart: unless-stopped
    ports:
      - ${FLOWER_PUBLIC_PORT:-5555}:5555
    depends_on:
      - rabbit
    logging:
        options:
            max-size: "20m"
            max-file: "5"

  #-----------------------------------------------
  #   Redis
  #-----------------------------------------------
  redis:
    image: redis
    ports:
      - 6379:6379
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  #-----------------------------------------------
  #   Celery Service
  #-----------------------------------------------
  site_worker:
    command: bash -c "mkdir -p /app/src/uploads && chmod 0777 /app/src/uploads && watchmedo auto-restart -p '*.py' --recursive -- celery -A celery_config worker -B -Q site-worker -l info -n site-worker@%n --concurrency=2"
    working_dir: /app/src
    build:
      context: .
    depends_on:
      - rabbit
      - db
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=settings.develop
      - PYTHONPATH=/app:/app/src:/app/src/apps
      - CELERY_BROKER_URL=pyamqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbit:${RABBITMQ_PORT}//
      - BROKER_URL=pyamqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbit:${RABBITMQ_PORT}//
      - RABBITMQ_HOST=rabbit
    volumes:
      - .:/app
      - django_uploads:/app/src/uploads
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256M

  compute_worker_static:
    platform: linux/amd64
    command: ["watchmedo auto-restart -p '*.py' --recursive -- celery -A compute_worker worker -l info -Q ${QUEUE_STATIC:-compute-worker-static} -n compute-worker-static@%n"]
    working_dir: /app
    build:
      context: .
      dockerfile: Dockerfile.compute_worker
    depends_on:
      - django
      - rabbit
      - submission_runtime_py310_survival
    volumes:
      - ./compute_worker:/app
      - ${HOST_DIRECTORY:-/tmp/codabench}:/codabench
      # Actual connection back to docker parent to run things
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    environment:
      - BROKER_URL=pyamqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${RABBITMQ_HOST}:${RABBITMQ_PORT}//
      - QUEUE_STATIC=${QUEUE_STATIC:-compute-worker-static}
      - QUEUE_ROLLING=${QUEUE_ROLLING:-compute-worker-rolling}
      # Keep competition docker_image unchanged; compute-worker maps legacy py37 to this runtime.
      - SUBMISSION_RUNTIME_IMAGE_OVERRIDE=aidf-codabench-submission-runtime:py310-survival
      # Make the worker leave behind the submission so we can examine it
      - CODALAB_IGNORE_CLEANUP_STEP=1
      - COLUMNS=100
    tty: true
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  compute_worker_rolling:
    platform: linux/amd64
    command: ["watchmedo auto-restart -p '*.py' --recursive -- celery -A compute_worker worker -l info -Q ${QUEUE_ROLLING:-compute-worker-rolling} -n compute-worker-rolling@%n"]
    working_dir: /app
    build:
      context: .
      dockerfile: Dockerfile.compute_worker
    depends_on:
      - django
      - rabbit
      - submission_runtime_py310_survival
    volumes:
      - ./compute_worker:/app
      - ${HOST_DIRECTORY:-/tmp/codabench}:/codabench
      # Actual connection back to docker parent to run things
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    environment:
      - BROKER_URL=pyamqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${RABBITMQ_HOST}:${RABBITMQ_PORT}//
      - QUEUE_STATIC=${QUEUE_STATIC:-compute-worker-static}
      - QUEUE_ROLLING=${QUEUE_ROLLING:-compute-worker-rolling}
      # Keep competition docker_image unchanged; compute-worker maps legacy py37 to this runtime.
      - SUBMISSION_RUNTIME_IMAGE_OVERRIDE=aidf-codabench-submission-runtime:py310-survival
      # Make the worker leave behind the submission so we can examine it
      - CODALAB_IGNORE_CLEANUP_STEP=1
      - COLUMNS=100
    tty: true
    logging:
      options:
        max-size: "20m"
        max-file: "5"
volumes:
  minio_data:
  django_uploads:
